<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#7a2424"/>
      <stop offset="60%" stop-color="#4a1414"/>
      <stop offset="100%" stop-color="#2a0707"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6dc8b"/>
      <stop offset="50%" stop-color="#c8902a"/>
      <stop offset="100%" stop-color="#7a4f0c"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8d6"/>
      <stop offset="100%" stop-color="#e8c46a"/>
    </linearGradient>
  </defs>

  <!-- background plate (rounded square so it looks great on dock/tab) -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- subtle inner glow -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="none" stroke="rgba(255,220,140,0.08)" stroke-width="1"/>

  <!-- two interlocking wedding rings -->
  <g transform="translate(0, 4)">
    <circle cx="25" cy="36" r="13" fill="none" stroke="url(#ring)" stroke-width="3.4"/>
    <circle cx="39" cy="36" r="13" fill="none" stroke="url(#ring)" stroke-width="3.4"/>
  </g>

  <!-- small diamond accent above the rings -->
  <path d="M32 11 L28 17 L32 24 L36 17 Z" fill="url(#diamond)" stroke="#c8902a" stroke-width="0.6"/>
  <path d="M28 17 L36 17" stroke="#7a4f0c" stroke-width="0.6"/>
</svg>
